<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JET AC</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8;
      color: #1e293b;
      min-height: 100vh;
    }

    header {
      background: #1e293b;
      color: white;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    .header-logo {
      width: 44px; height: 44px;
      background: rgba(255,255,255,.1);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .header-title { font-size: 1.2rem; font-weight: 700; }
    .header-sub   { font-size: .8rem; color: #94a3b8; margin-top: 2px; }

    .container {
      max-width: 640px;
      margin: 48px auto;
      padding: 0 16px;
    }

    .page-label {
      font-size: .75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: #64748b; margin-bottom: 16px;
    }

    .app-grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .app-card {
      background: white;
      border-radius: 14px;
      box-shadow: 0 2px 10px rgba(0,0,0,.07);
      padding: 22px 24px;
      display: flex;
      align-items: center;
      gap: 18px;
      text-decoration: none;
      color: inherit;
      border: 2px solid transparent;
      transition: border-color .15s, box-shadow .15s, transform .1s;
    }
    .app-card:hover {
      border-color: #2563eb;
      box-shadow: 0 4px 18px rgba(37,99,235,.12);
      transform: translateY(-1px);
    }
    .app-card:active { transform: scale(.99); }

    .app-icon {
      width: 52px; height: 52px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; flex-shrink: 0;
    }
    .icon-blue   { background: #eff6ff; }

    .app-info { flex: 1; }
    .app-name { font-size: 1rem; font-weight: 700; color: #1e293b; margin-bottom: 3px; }
    .app-desc { font-size: .83rem; color: #64748b; line-height: 1.4; }

    .app-arrow {
      font-size: 1.2rem; color: #cbd5e1; flex-shrink: 0;
      transition: color .15s, transform .15s;
    }
    .app-card:hover .app-arrow { color: #2563eb; transform: translateX(3px); }

    .help {
      margin-top: 28px;
      text-align: center;
      font-size: .85rem;
      color: #64748b;
      line-height: 1.6;
    }
    .help a { color: #2563eb; text-decoration: none; font-weight: 600; }

    @media (max-width: 480px) {
      .container { margin-top: 32px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-logo">❄️</div>
  <div>
    <div class="header-title">JET AC</div>
    <div class="header-sub">Customer self-service</div>
  </div>
</header>

<div class="container">
  <div class="page-label">How can we help?</div>
  <div class="app-grid">

    <a class="app-card" href="/reschedule/">
      <div class="app-icon icon-blue">📅</div>
      <div class="app-info">
        <div class="app-name">Reschedule your appointment</div>
        <div class="app-desc">Pick a new day for your service visit. Open the link from your appointment text, or call us and we'll help.</div>
      </div>
      <div class="app-arrow">›</div>
    </a>

  </div>

  <div class="help">
    Need a hand? Call or text us at <a href="tel:+13054499924">305-449-9924</a>.
  </div>
</div>

</body>
</html>
